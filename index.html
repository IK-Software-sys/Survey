<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clinical Assessment Portal</title>
    <style>
        :root {
            --med-blue: #3182ce;
            --bg-dark: #0a0e17;
            --card-dark: #161b22;
            --text-light: #c9d1d9;
            --sanity-red: #da3633;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }

        header {
            background: #000;
            color: var(--med-blue); padding: 12px;
            text-align: center; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 3px;
            border-bottom: 1px solid #30363d;
        }

        .stats-bar {
            padding: 10px 20px; background: #000;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.75rem; letter-spacing: 1px; color: #8b949e;
        }

        .sanity-container { width: 120px; height: 6px; background: #30363d; border-radius: 3px; overflow: hidden; }
        #sanity-fill { height: 100%; width: 100%; background: var(--sanity-red); transition: width 0.4s ease; }

        .progress-bar { height: 2px; background: #21262d; width: 100%; }
        #progress-fill { height: 100%; background: var(--med-blue); width: 0%; transition: width 0.3s; }

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .survey-card {
            width: 100%; max-width: 460px;
            background: var(--card-dark); padding: 35px;
            border-radius: 6px; border: 1px solid #30363d;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            transition: opacity 0.5s ease;
        }

        h2 { font-size: 1.05rem; margin-bottom: 25px; line-height: 1.6; font-weight: 400; color: #f0f6fc; }

        .options-list { display: flex; flex-direction: column; gap: 12px; }

        .btn-opt {
            background: #0d1117; border: 1px solid #30363d;
            padding: 15px; border-radius: 4px; color: #8b949e;
            text-align: left; font-size: 0.85rem; cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-opt:hover { background: #1c2128; border-color: #8b949e; color: #f0f6fc; }

        #blackout {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: none; z-index: 2000;
        }

        #police-report {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; color: #d1d5db; padding: 50px;
            display: none; z-index: 2001; font-family: 'Courier New', Courier, monospace;
            overflow-y: auto;
        }

        .report-box { max-width: 650px; margin: 0 auto; border: 1px solid #222; padding: 30px; line-height: 1.6; }
        
        #static-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; pointer-events: none; z-index: 1000;
        }

        .breathing { animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<header>Central Medical Database - Security Level 4</header>
<div class="stats-bar">
    <span>STABILITY INDEX</span>
    <div class="sanity-container"><div id="sanity-fill"></div></div>
</div>
<div class="progress-bar"><div id="progress-fill"></div></div>

<canvas id="static-canvas"></canvas>

<main>
    <div class="survey-card" id="card">
        <h2 id="q-text">Initialising...</h2>
        <div class="options-list" id="opt-list"></div>
    </div>
</main>

<div id="blackout"></div>
<div id="police-report">
    <div class="report-box" id="report-content"></div>
</div>

<audio id="bg-sfx" loop><source src="freesound_community-scray-reverse-piano-with-clock-ticking-63173.mp3" type="audio/mpeg"></audio>
<audio id="whisper-sfx"><source src="dragon-studio-scary-ghost-whisper-410565 (1).mp3" type="audio/mpeg"></audio>
<audio id="click-sfx"><source src="mixkit-negative-tone-interface-tap-2569.wav" type="audio/wav"></audio>
<audio id="door-sfx"><source src="dragon-studio-door-creaking-335491.mp3" type="audio/mpeg"></audio>
<audio id="jumpscare-sfx"><source src="u_xg7ssi08yr-television-static-421360.mp3" type="audio/mpeg"></audio>
<audio id="gun-sfx"><source src="freesound_community-gun-shot-1-7069.mp3" type="audio/mpeg"></audio>

<script>
    let step = 0;
    let sanity = 100;
    const questions = [
        { q: "How many hours of restful sleep have you achieved in the last 48 hours?", opts: ["8+ hours", "6 hours", "4 hours", "2 hours", "None"] },
        { q: "Do you find yourself losing interest in hobbies you previously enjoyed?", opts: ["Not at all", "Slightly", "Significantly", "Entirely", "I don't remember joy"] },
        { q: "Rate your current level of physical exhaustion.", opts: ["Low", "Moderate", "High", "Debilitating", "My limbs feel like lead"] },
        { q: "How often do you struggle to get out of bed in the morning?", opts: ["Never", "Once a week", "Every other day", "Daily", "The bed is the only safe place"] },
        { q: "Do you experience 'brain fog' or difficulty concentrating?", opts: ["Never", "Rarely", "Often", "Always", "Thoughts are disappearing"] },
        { q: "When you look in the mirror, do you recognize the person looking back?", opts: ["Always", "Mostly", "Rarely", "It's a stranger", "It is not my face"] },
        { q: "Does the concept of 'tomorrow' bring you any sense of hope?", opts: ["Yes", "Maybe", "No", "Tomorrow is a threat", "Time has stopped"] },
        { q: "How often do you feel like you are watching your life through a screen?", opts: ["Never", "Rarely", "Commonly", "I am a spectator", "Break the glass"] },
        { q: "Rate the silence in your home.", opts: ["Peaceful", "Quiet", "Heavy", "Suffocating", "The silence is screaming"] },
        { q: "Do you feel like you are being punished for something you didn't do?", opts: ["No", "Unsure", "Yes", "By life", "I deserve this"] },
        { q: "Do you hear your name being called when no one else is in the room?", opts: ["Never", "Once", "Weekly", "Daily", "We are talking now"] },
        { q: "Do you believe your neighbors have installed cameras inside your walls?", opts: ["No", "Unlikely", "Possibly", "I've seen the lenses", "They are watching"] },
        { q: "Does the static on the TV contain messages meant only for you?", opts: ["No", "N/A", "Sometimes", "Clearly", "I follow the static"] },
        { q: "How many people are currently hiding in your peripheral vision?", opts: ["0", "Maybe 1", "3 or more", "Too many to count", "One is touching you"] },
        { q: "Do your thoughts feel like they belong to someone else?", opts: ["No", "Occasionally", "Mostly", "They are stolen", "Stop reading my mind"] },
        { q: "Can you feel the breathing on the back of your neck right now?", opts: ["No", "Just a draft", "Yes", "It's getting warmer", "Don't turn around"] },
        { q: "If you were to vanish this very moment, would anyone truly notice your disappearance?", opts: ["Yes", "Eventually", "Maybe one person", "Probably not", "I am already gone"] },
        { q: "If you disappeared tonight, how many days would pass before the smell alerted the neighbors?", opts: ["1-2 days", "A week", "A month", "Nobody would check", "I'm already gone"] },
        { q: "Are you still alone in the room?", opts: ["Yes", "No", "I think so", "Someone just moved", "HELP ME"] },
        { q: "Will you let us in?", opts: ["No", "Please stop", "Yes", "I have no choice", "THE DOOR IS OPEN"] }
    ];

    function updateGame() {
        const data = questions[step];
        document.getElementById('q-text').innerText = data.q;
        const optBox = document.getElementById('opt-list');
        optBox.innerHTML = '';

        document.getElementById('progress-fill').style.width = ((step / questions.length) * 100) + "%";

        if (step === 5) document.getElementById('bg-sfx').play().catch(()=>{});
        if (step === 10) document.getElementById('whisper-sfx').play();
        if (step === 15) document.getElementById('card').classList.add('breathing');

        data.opts.forEach((text, i) => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = text;
            b.onclick = () => handleChoice(i);
            optBox.appendChild(b);
        });
    }

    function handleChoice(index) {
        document.getElementById('click-sfx').currentTime = 0;
        document.getElementById('click-sfx').play();
        
        // Sanity damage logic
        if (index === 3) sanity -= 10;
        if (index === 4) sanity -= 20;
        
        document.getElementById('sanity-fill').style.width = sanity + "%";

        if (sanity <= 0) {
            triggerEnding("suicide");
            return;
        }

        step++;
        if (step < questions.length) {
            updateGame();
        } else {
            triggerEnding("intruder");
        }
    }

    function triggerEnding(type) {
        const blackout = document.getElementById('blackout');
        const report = document.getElementById('police-report');
        const content = document.getElementById('report-content');

        if (type === "suicide") {
            document.getElementById('bg-sfx').pause();
            document.getElementById('gun-sfx').play();
            blackout.style.display = "block";

            // 3-second blackout before report
            setTimeout(() => {
                report.style.display = "block";
                content.innerHTML = `
                    <h2 style="color:#ef4444">POLICE DEPARTMENT - CRIME SCENE DIVISION</h2>
                    <p><strong>CASE ID:</strong> 2026-X88</p>
                    <p><strong>SUBJECT:</strong> UNIDENTIFIED USER</p>
                    <hr style="border-color:#333">
                    <p>Officers arrived at the scene at 03:14 AM following reports of a single gunshot. Upon entry, the victim was discovered seated at a desk, facing a computer screen.</p>
                    <p>The display showed a 'Clinical Assessment' survey with 0% Stability remaining. The firearm was found in the subject's hand. No external force was detected.</p>
                    <p>The browser history indicates a rapid descent into acute paranoid psychosis over the span of 20 questions. Case closed: Self-Termination.</p>
                `;
            }, 3000);
        } else {
            // Intruder ending sequence: Door then Static
            document.getElementById('bg-sfx').pause();
            document.getElementById('door-sfx').play();
            document.getElementById('card').style.opacity = "0";

            setTimeout(() => {
                document.getElementById('jumpscare-sfx').play();
                startStatic();
                
                setTimeout(() => {
                    report.style.display = "block";
                    content.innerHTML = `
                        <h2 style="color:white">FBI MISSING PERSONS BUREAU</h2>
                        <p><strong>CASE ID:</strong> 2026-M41</p>
                        <p><strong>STATUS:</strong> OPEN / UNRESOLVED</p>
                        <hr style="border-color:#333">
                        <p>The victim's residence was found abandoned. The front door was found forced open from the inside. Coffee was still warm on the desk. No biological traces were found at the scene.</p>
                        <p>Evidence gathered from dark web intercepts suggests the victim was 'harvested' within minutes of completing a psychological screening. Intelligence indicates several internal organs were sold via a private auction 4 hours after the disappearance.</p>
                        <p>The subject is still missing. They are survived by no one.</p>
                    `;
                }, 1500);
            }, 2500); // Wait for door creak to finish
        }
    }

    function startStatic() {
        const canvas = document.getElementById('static-canvas');
        const ctx = canvas.getContext('2d');
        canvas.style.opacity = "1";
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        function draw() {
            const idata = ctx.createImageData(canvas.width, canvas.height);
            const buffer32 = new Uint32Array(idata.data.buffer);
            for (let i = 0; i < buffer32.length; i++) buffer32[i] = Math.random() < 0.5 ? 0xff000000 : 0xffffffff;
            ctx.putImageData(idata, 0, 0);
            requestAnimationFrame(draw);
        }
        draw();
    }

    updateGame();
</script>

</body>
</html>
