<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clinical Assessment Portal</title>
    <style>
        :root {
            --med-blue: #2a5298;
            --clinical-white: #f0f2f5;
            --text-dark: #1a202c;
            --sanity-color: #48bb78;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--clinical-white);
            color: var(--text-dark);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; transition: background 2s ease;
        }

        header {
            background: var(--med-blue);
            color: white; padding: 12px;
            text-align: center; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 2px;
            z-index: 10;
        }

        .stats-container {
            padding: 10px 20px;
            background: #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .sanity-wrapper { width: 150px; height: 10px; background: #cbd5e0; border-radius: 5px; overflow: hidden; }
        #sanity-fill { height: 100%; width: 100%; background: var(--sanity-color); transition: width 0.5s, background 0.5s; }

        .progress-bar { height: 4px; background: #ccd6dd; width: 100%; }
        #progress-fill { height: 100%; background: #4299e1; width: 0%; transition: width 0.3s; }

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 5; }

        .survey-card {
            width: 100%; max-width: 450px;
            background: white; padding: 25px;
            border-radius: 4px; border-bottom: 3px solid var(--med-blue);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.8s ease;
        }

        h2 { font-size: 1.1rem; margin-bottom: 20px; line-height: 1.6; font-weight: 500; }

        .options-list { display: flex; flex-direction: column; gap: 8px; }

        .btn-opt {
            background: #fff; border: 1px solid #d1d5db;
            padding: 14px; border-radius: 4px;
            text-align: left; font-size: 0.9rem;
            outline: none; cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-opt:active { transform: scale(0.98); }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: none; z-index: 1000;
            color: white; padding: 40px; box-sizing: border-box;
            font-family: 'Courier New', monospace; overflow-y: auto;
        }

        #static-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; pointer-events: none; z-index: 999;
        }

        .report-text { max-width: 600px; margin: 0 auto; line-height: 1.6; border-left: 2px solid #555; padding-left: 20px; }
        .breathing { animation: breathe 5s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    </style>
</head>
<body>

<header>Central Medical Database - Security Level 4</header>
<div class="stats-container">
    <span>PATIENT STABILITY</span>
    <div class="sanity-wrapper"><div id="sanity-fill"></div></div>
</div>
<div class="progress-bar"><div id="progress-fill"></div></div>

<canvas id="static-canvas"></canvas>

<main>
    <div class="survey-card" id="card">
        <h2 id="q-text">System Initializing...</h2>
        <div class="options-list" id="opt-list"></div>
    </div>
</main>

<div id="overlay">
    <div class="report-text" id="report-content"></div>
</div>

<audio id="bg-sfx" loop><source src="freesound_community-scray-reverse-piano-with-clock-ticking-63173.mp3" type="audio/mpeg"></audio>
<audio id="whisper-sfx"><source src="dragon-studio-scary-ghost-whisper-410565 (1).mp3" type="audio/mpeg"></audio>
<audio id="click-sfx"><source src="mixkit-negative-tone-interface-tap-2569.wav" type="audio/wav"></audio>
<audio id="door-sfx"><source src="dragon-studio-door-creaking-335491.mp3" type="audio/mpeg"></audio>
<audio id="jumpscare-sfx"><source src="u_xg7ssi08yr-television-static-421360.mp3" type="audio/mpeg"></audio>
<audio id="gun-sfx"><source src="freesound_community-gun-shot-1-7069.mp3" type="audio/mpeg"></audio>

<script>
    let step = 0;
    let sanity = 100;
    const questions = [
        { q: "How many hours of sleep have you achieved recently?", opts: ["8 hours", "6 hours", "4 hours", "2 hours", "None"], damage: [0, 0, 5, 10, 20] },
        { q: "Do you find yourself losing interest in your hobbies?", opts: ["Never", "Rarely", "Often", "Entirely", "I don't remember joy"], damage: [0, 0, 5, 10, 20] },
        { q: "Rate your current level of physical exhaustion.", opts: ["Low", "Moderate", "High", "Debilitating", "My limbs feel like lead"], damage: [0, 5, 10, 15, 25] },
        { q: "Do you experience 'brain fog' or difficulty concentrating?", opts: ["Never", "Rarely", "Often", "Always", "Thoughts are disappearing"], damage: [0, 0, 5, 15, 25] },
        { q: "When you look in the mirror, do you recognize the person?", opts: ["Always", "Mostly", "Rarely", "It's a stranger", "It is not my face"], damage: [0, 5, 15, 20, 30] },
        { q: "Does the concept of 'tomorrow' bring you hope?", opts: ["Yes", "Maybe", "No", "Tomorrow is a threat", "Time has stopped"], damage: [0, 5, 10, 20, 30] },
        { q: "Rate the silence in your home.", opts: ["Peaceful", "Quiet", "Heavy", "Suffocating", "The silence is screaming"], damage: [0, 0, 10, 20, 40] },
        { q: "Do you hear your name called when no one is home?", opts: ["Never", "Once", "Weekly", "Daily", "We are talking now"], damage: [0, 5, 15, 25, 50] },
        { q: "How many shapes are in your peripheral vision?", opts: ["0", "Maybe 1", "3 or more", "Too many", "One is touching you"], damage: [0, 10, 20, 30, 60] },
        { q: "Will you let us in?", opts: ["No", "Please stop", "Yes", "I have no choice", "THE DOOR IS OPEN"], damage: [10, 20, 0, 0, 0] }
    ];

    function updateGame() {
        const data = questions[step];
        document.getElementById('q-text').innerText = data.q;
        const optBox = document.getElementById('opt-list');
        optBox.innerHTML = '';

        document.getElementById('progress-fill').style.width = ((step / questions.length) * 100) + "%";

        if (step === 3) document.getElementById('bg-sfx').play().catch(() => {});
        if (step === 7) document.getElementById('whisper-sfx').play();
        if (step === 9) {
            document.getElementById('door-sfx').play();
            document.getElementById('card').classList.add('breathing');
        }

        data.opts.forEach((text, i) => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = text;
            b.onclick = () => handleChoice(data.damage[i]);
            optBox.appendChild(b);
        });
    }

    function handleChoice(dmg) {
        document.getElementById('click-sfx').currentTime = 0;
        document.getElementById('click-sfx').play();
        
        sanity -= dmg;
        if (sanity < 0) sanity = 0;
        updateSanityUI();

        if (sanity <= 0) {
            triggerEnding("suicide");
            return;
        }

        step++;
        if (step < questions.length) {
            updateGame();
        } else {
            triggerEnding("intruder");
        }
    }

    function updateSanityUI() {
        const fill = document.getElementById('sanity-fill');
        fill.style.width = sanity + "%";
        if (sanity < 30) {
            fill.style.background = "#e53e3e";
            document.body.style.background = "#1a202c";
        } else if (sanity < 60) {
            fill.style.background = "#dd6b20";
        }
    }

    function triggerEnding(type) {
        const overlay = document.getElementById('overlay');
        const report = document.getElementById('report-content');
        
        if (type === "suicide") {
            document.getElementById('bg-sfx').pause();
            document.getElementById('gun-sfx').play();
            overlay.style.display = "block";
            report.innerHTML = `
                <h1>POLICE REPORT: CASE #9902</h1>
                <p><strong>STATUS:</strong> CLOSED (DECEASED)</p>
                <hr>
                <p>On [REDACTED], officers responded to reports of a single gunshot at the subject's residence.</p>
                <p>Upon entry, the subject was found at their desk. A browser window was open to a 'Clinical Assessment' portal. No signs of struggle were present.</p>
                <p>Forensics found notes scattered around the room detailing a 'presence' that does not exist on any security footage.</p>
                <p><em>"The subject simply couldn't handle the silence anymore."</em></p>
            `;
        } else {
            document.getElementById('jumpscare-sfx').play();
            startStatic();
            setTimeout(() => {
                overlay.style.display = "block";
                report.innerHTML = `
                    <h1>MISSING PERSONS BUREAU: CASE #1105</h1>
                    <p><strong>STATUS:</strong> INVESTIGATION ONGOING</p>
                    <hr>
                    <p>Subject vanished from their locked apartment on Tuesday night. Neighbors report a "door creaking" sound, despite the subject being alone.</p>
                    <p>Blood splatter was found in the hallway, but no body. Forensic analysis of the dark web has flagged several high-value 'biological listings' matching the subject's rare blood type.</p>
                    <p>The subject is presumed to be disassembled and distributed across several international markets.</p>
                    <p><strong>CURRENT LOCATION:</strong> UNKNOWN / PIECES</p>
                `;
            }, 2000);
        }
    }

    function startStatic() {
        const canvas = document.getElementById('static-canvas');
        const ctx = canvas.getContext('2d');
        canvas.style.opacity = "1";
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        function draw() {
            const idata = ctx.createImageData(canvas.width, canvas.height);
            const buffer32 = new Uint32Array(idata.data.buffer);
            for (let i = 0; i < buffer32.length; i++) buffer32[i] = Math.random() < 0.5 ? 0xff000000 : 0xffffffff;
            ctx.putImageData(idata, 0, 0);
            if(canvas.style.opacity === "1") requestAnimationFrame(draw);
        }
        draw();
    }

    updateGame();
</script>

</body>
</html>
