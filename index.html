<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clinical Assessment Portal</title>
    <style>
        :root {
            --med-blue: #1a365d;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f1f5f9;
            --sanity-color: #22c55e;
            --border-glow: #334155;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }

        header {
            background: #000;
            color: #64748b; padding: 10px;
            text-align: center; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 3px;
            border-bottom: 1px solid var(--border-glow);
        }

        .stats-container {
            padding: 12px 25px;
            background: #020617;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.75rem; letter-spacing: 1px;
        }

        .sanity-wrapper { width: 120px; height: 6px; background: #334155; border-radius: 3px; overflow: hidden; }
        #sanity-fill { height: 100%; width: 100%; background: var(--sanity-color); transition: width 0.4s ease; }

        .progress-bar { height: 2px; background: #1e293b; width: 100%; }
        #progress-fill { height: 100%; background: #3b82f6; width: 0%; transition: width 0.3s; }

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .survey-card {
            width: 100%; max-width: 420px;
            background: var(--card-bg); padding: 30px;
            border-radius: 8px; border: 1px solid var(--border-glow);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { font-size: 1.05rem; margin-bottom: 25px; line-height: 1.6; font-weight: 400; color: #cbd5e1; }

        .options-list { display: flex; flex-direction: column; gap: 10px; }

        .btn-opt {
            background: #0f172a; border: 1px solid #334155;
            padding: 15px; border-radius: 5px;
            text-align: left; font-size: 0.85rem; color: #94a3b8;
            outline: none; cursor: pointer; transition: all 0.2s;
        }
        .btn-opt:hover { background: #1e293b; border-color: #475569; color: #f1f5f9; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: none; z-index: 1000;
            color: #d1d5db; padding: 50px; box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        #static-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; pointer-events: none; z-index: 999;
        }

        .report-text { 
            max-width: 550px; margin: 50px auto; line-height: 1.8; 
            opacity: 0; transition: opacity 2s ease;
        }

        .breathing { animation: breathe 6s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.015); opacity: 0.8; } }
    </style>
</head>
<body>

<header>Neural Assessment Terminal v.4.0.2</header>
<div class="stats-container">
    <span>SYSTEM_STABILITY:</span>
    <div class="sanity-wrapper"><div id="sanity-fill"></div></div>
</div>
<div class="progress-bar"><div id="progress-fill"></div></div>

<canvas id="static-canvas"></canvas>

<main>
    <div class="survey-card" id="card">
        <h2 id="q-text">Initializing session...</h2>
        <div class="options-list" id="opt-list"></div>
    </div>
</main>

<div id="overlay">
    <div class="report-text" id="report-content"></div>
</div>

<audio id="bg-sfx" loop><source src="freesound_community-scray-reverse-piano-with-clock-ticking-63173.mp3" type="audio/mpeg"></audio>
<audio id="whisper-sfx"><source src="dragon-studio-scary-ghost-whisper-410565 (1).mp3" type="audio/mpeg"></audio>
<audio id="click-sfx"><source src="mixkit-negative-tone-interface-tap-2569.wav" type="audio/wav"></audio>
<audio id="door-sfx"><source src="dragon-studio-door-creaking-335491.mp3" type="audio/mpeg"></audio>
<audio id="jumpscare-sfx"><source src="u_xg7ssi08yr-television-static-421360.mp3" type="audio/mpeg"></audio>
<audio id="gun-sfx"><source src="freesound_community-gun-shot-1-7069.mp3" type="audio/mpeg"></audio>

<script>
    let step = 0;
    let sanity = 100;
    
    const questions = [
        { q: "How much sleep have you achieved in the last 48 hours?", opts: ["8 hours", "6 hours", "4 hours", "2 hours", "None"], damage: [0, 0, 10, 15, 25] },
        { q: "Do you find yourself losing interest in hobbies?", opts: ["Never", "Rarely", "Significantly", "Entirely", "I don't remember joy"], damage: [0, 5, 10, 20, 30] },
        { q: "Rate your current level of mental exhaustion.", opts: ["Low", "Moderate", "High", "Debilitating", "My mind is failing"], damage: [0, 5, 15, 20, 35] },
        { q: "Do you experience 'brain fog' or phantom sounds?", opts: ["Never", "Rarely", "Often", "Always", "They are constant"], damage: [0, 5, 15, 25, 40] },
        { q: "When you look in the mirror, do you recognize the face?", opts: ["Always", "Mostly", "Rarely", "It's a stranger", "It is not my face"], damage: [0, 10, 20, 30, 50] },
        { q: "Does the concept of 'tomorrow' feel like a threat?", opts: ["No", "Unsure", "Yes", "Terrifying", "There is no tomorrow"], damage: [0, 10, 15, 30, 45] },
        { q: "Rate the pressure of the silence in this room.", opts: ["Normal", "Heavy", "Suffocating", "Vibrating", "The silence is screaming"], damage: [0, 10, 25, 35, 50] },
        { q: "Is someone standing directly behind you right now?", opts: ["No", "Unlikely", "Possibly", "I can feel them", "They are touching me"], damage: [0, 15, 30, 45, 60] },
        { q: "Will you open the door to let the process finish?", opts: ["No", "Please stop", "Yes", "I have no choice", "THE DOOR IS OPEN"], damage: [20, 30, 5, 0, 0] }
    ];

    function updateGame() {
        const data = questions[step];
        document.getElementById('q-text').innerText = data.q;
        const optBox = document.getElementById('opt-list');
        optBox.innerHTML = '';

        document.getElementById('progress-fill').style.width = ((step / questions.length) * 100) + "%";

        if (step === 2) document.getElementById('bg-sfx').play().catch(() => {});
        if (step === 5) document.getElementById('whisper-sfx').play();
        if (step === 8) document.getElementById('door-sfx').play();

        data.opts.forEach((text, i) => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = text;
            b.onclick = () => handleChoice(data.damage[i]);
            optBox.appendChild(b);
        });
    }

    function handleChoice(dmg) {
        document.getElementById('click-sfx').currentTime = 0;
        document.getElementById('click-sfx').play();
        
        sanity -= dmg;
        if (sanity < 0) sanity = 0;
        updateSanityUI();

        if (sanity <= 0) {
            triggerEnding("suicide");
            return;
        }

        step++;
        if (step < questions.length) {
            updateGame();
        } else {
            triggerEnding("intruder");
        }
    }

    function updateSanityUI() {
        const fill = document.getElementById('sanity-fill');
        fill.style.width = sanity + "%";
        if (sanity < 35) fill.style.background = "#ef4444";
    }

    function triggerEnding(type) {
        const overlay = document.getElementById('overlay');
        const report = document.getElementById('report-content');
        
        if (type === "suicide") {
            document.getElementById('bg-sfx').pause();
            document.getElementById('gun-sfx').play();
            // Black out
            overlay.style.display = "block";
            
            // Wait 3 seconds then show text
            setTimeout(() => {
                report.style.opacity = "1";
                report.innerHTML = `
                    <h2 style="color:white; border-bottom: 1px solid #334">FILE_DELETED: EVIDENCE_LOG_9902</h2>
                    <p style="color:#64748b">[RECORDING START]</p>
                    <p>Officers arrived at 03:00 following a noise complaint. Subject found slumped at terminal.</p>
                    <p>Investigation found a single firearm on the floor. The assessment on screen was completed with 0% stability. No other individuals were found in the locked room.</p>
                    <p>Strangely, the subject's final browser history shows they were talking to someone who wasn't there.</p>
                    <p><strong>VERDICT:</strong> SELF-TERMINATION DUE TO ACUTE PSYCHOSIS.</p>
                `;
            }, 3000);

        } else {
            document.getElementById('jumpscare-sfx').play();
            startStatic();
            setTimeout(() => {
                overlay.style.display = "block";
                report.style.opacity = "1";
                report.innerHTML = `
                    <h2 style="color:white; border-bottom: 1px solid #334">MISSING PERSONS: CASE_1105</h2>
                    <p style="color:#64748b">[CASE STATUS: UNRESOLVED]</p>
                    <p>The subject vanished while the assessment was active. The door was locked from the inside. Windows remained undisturbed.</p>
                    <p>Evidence suggests an intruder entered through a 'structural anomaly' in the wall. Biological traces suggest the subject was harvested for black market organ trade.</p>
                    <p>Subject's remains have been flagged in three different countries. The head was never recovered.</p>
                    <p><strong>LOCATION:</strong> UNKNOWN / DISTRIBUTED</p>
                `;
            }, 2000);
        }
    }

    function startStatic() {
        const canvas = document.getElementById('static-canvas');
        const ctx = canvas.getContext('2d');
        canvas.style.opacity = "1";
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        function draw() {
            const idata = ctx.createImageData(canvas.width, canvas.height);
            const buffer32 = new Uint32Array(idata.data.buffer);
            for (let i = 0; i < buffer32.length; i++) buffer32[i] = Math.random() < 0.5 ? 0xff000000 : 0xffffffff;
            ctx.putImageData(idata, 0, 0);
            if(canvas.style.opacity === "1") requestAnimationFrame(draw);
        }
        draw();
    }

    updateGame();
</script>

</body>
</html>
